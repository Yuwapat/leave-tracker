        ];

        // ประวัติการลาพนักงาน
        const initialLeaves = [
            {
                id: "L01",
                teacherId: "T01",
                startDate: "2026-06-17",
                endDate: "2026-06-17",
                type: "personal",
                period: "all_day",
                reason: "ทำธุระต่อใบขับขี่ที่ขนส่ง",

            },
            {
                id: "L02",
                teacherId: "T02",
                startDate: "2026-06-18",
                endDate: "2026-06-18",
                type: "sick",
                period: "all_day",
                reason: "ไข้หวัดใหญ่ หาหมอโรงพยาบาล",
                totalDeducted: 1.5,
                status: "approved",
                breakdown: [
                    { date: "2026-06-18", base: 1.0, penalty: 0.5, penaltyReason: "มีกิจกรรมโรงเรียน (ช่วงเช้า)", final: 1.5 }
                ],
                createdAt: "2026-05-12"
            }
        ];

        function App() {
            const [users, setUsers] = React.useState(() => {
                const saved = localStorage.getItem("leave_users");
                return saved ? JSON.parse(saved) : initialUsers;
            });

            const [currentUser, setCurrentUser] = React.useState(() => {
                const saved = localStorage.getItem("leave_current_user");
                return saved ? JSON.parse(saved) : null;
            });

            const [holidays, setHolidays] = React.useState(() => {
                const saved = localStorage.getItem("leave_holidays");
                return saved ? JSON.parse(saved) : initialHolidays;
            });

            const [activities, setActivities] = React.useState(() => {
                const saved = localStorage.getItem("leave_activities");
                return saved ? JSON.parse(saved) : initialActivities;
            });

            const [leaves, setLeaves] = React.useState(() => {
                const saved = localStorage.getItem("leave_leaves");
                return saved ? JSON.parse(saved) : initialLeaves;
            });

            const [loginId, setLoginId] = React.useState("");
            const [loginPassword, setLoginPassword] = React.useState("");
            const [activeTab, setActiveTab] = React.useState("teacher"); 
            const [adminSubTab, setAdminSubTab] = React.useState("leaves"); 
            const [selectedTeacherId, setSelectedTeacherId] = React.useState("");
            const [formData, setFormData] = React.useState({ startDate: "", endDate: "", type: "personal", reason: "", period: "all_day" });
            const [notification, setNotification] = React.useState(null);

            const [showAddTeacherModal, setShowAddTeacherModal] = React.useState(false);
            const [newTeacher, setNewTeacher] = React.useState({ prefix: "นาย", name: "", email: "", sickQuota: 30, personalQuota: 15, role: "teacher", password: "1234", photo: "" });
            const [showEditTeacherModal, setShowEditTeacherModal] = React.useState(false);
            const [editingTeacher, setEditingTeacher] = React.useState(null);
            const [showAddHolidayModal, setShowAddHolidayModal] = React.useState(false);
            const [newHoliday, setNewHoliday] = React.useState({ date: "", name: "" });
            const [showAddActivityModal, setShowAddActivityModal] = React.useState(false);
            const [newActivity, setNewActivity] = React.useState({ date: "", name: "", session: "morning" });
            const [confirmDialog, setConfirmDialog] = React.useState({ isOpen: false, title: "", message: "", onConfirm: null });

            React.useEffect(() => { localStorage.setItem("leave_users", JSON.stringify(users)); }, [users]);
            React.useEffect(() => { localStorage.setItem("leave_current_user", currentUser ? JSON.stringify(currentUser) : ""); }, [currentUser]);
            React.useEffect(() => { localStorage.setItem("leave_holidays", JSON.stringify(holidays)); }, [holidays]);
            React.useEffect(() => { localStorage.setItem("leave_activities", JSON.stringify(activities)); }, [activities]);
            React.useEffect(() => { localStorage.setItem("leave_leaves", JSON.stringify(leaves)); }, [leaves]);

            React.useEffect(() => {
                if (currentUser) {
                    if (currentUser.role === "teacher") {
                        setSelectedTeacherId(currentUser.id);
                        setActiveTab("teacher");
                    } else {
                        const firstTeacher = users.find(u => u.role === "teacher") || users[0];
                        setSelectedTeacherId(firstTeacher ? firstTeacher.id : "");
                        setActiveTab("admin");
                    }
                }
            }, [currentUser]);

            // ล็อกวันเริ่มหยุดและวันสุดท้ายให้ตรงกันอัตโนมัติหากเลือก "ลาครึ่งวัน" เพื่อป้องกันการเลือกวันผิดพลาด
            React.useEffect(() => {
                if (formData.period !== "all_day" && formData.startDate) {
                    setFormData(prev => ({ ...prev, endDate: prev.startDate }));
                }
            }, [formData.startDate, formData.period]);

            const getTeacherStats = (teacherId) => {
                const teacherObj = users.find(u => u.id === teacherId);
                if (!teacherObj) return { sickUsed: 0, personalUsed: 0, personalDeductedFromLeaves: 0, latePenalty: 0, lateCount: 0 };
                
                const sickUsed = leaves
                    .filter(l => l.teacherId === teacherId && l.status === "approved" && l.type === "sick")
                    .reduce((sum, l) => sum + l.totalDeducted, 0);
                    
                const personalDeductedFromLeaves = leaves
                    .filter(l => l.teacherId === teacherId && l.status === "approved" && l.type === "personal")
                    .reduce((sum, l) => sum + l.totalDeducted, 0);
                    
                const lateCount = teacherObj.lateCount || 0;
                const latePenalty = lateCount >= 4 ? Math.floor((lateCount - 3) / 3) + 1 : 0;
                const personalUsed = personalDeductedFromLeaves + latePenalty;
                
                return { sickUsed, personalUsed, personalDeductedFromLeaves, latePenalty, lateCount };
            };

            const handleImageUpload = (file, callback) => {
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_SIZE = 120;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_SIZE) {
                                height *= MAX_SIZE / width;
                                width = MAX_SIZE;
                            }
                        } else {
                            if (height > MAX_SIZE) {
                                width *= MAX_SIZE / height;
                                height = MAX_SIZE;
                            }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        const base64Str = canvas.toDataURL('image/jpeg', 0.7);
                        callback(base64Str);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            };

            const showToast = (message, type = "success") => {
                setNotification({ message, type });
                setTimeout(() => setNotification(null), 4000);
            };

            const triggerConfirm = (title, message, onConfirmCallback) => {
                setConfirmDialog({
                    isOpen: true,
                    title,
                    message,
                    onConfirm: () => {
                        onConfirmCallback();
                        setConfirmDialog({ isOpen: false, title: "", message: "", onConfirm: null });
                    }
                });
            };

            const handleLogin = (e) => {
                e.preventDefault();
                const input = loginId.trim().toLowerCase();
                const matched = users.find(u => 
                    (u.email && u.email.toLowerCase() === input) || 
                    (u.id.toLowerCase() === input)
                );
                
                if (matched && matched.password === loginPassword) {
                    setCurrentUser(matched);
                    showToast(`ยินดีต้อนรับคุณ ${matched.prefix}${matched.name}`);
                    setLoginId("");
                    setLoginPassword("");
                } else {
                    showToast("อีเมลโรงเรียน/รหัสประจำตัว หรือ รหัสผ่านไม่ถูกต้อง", "error");
                }
            };

            const handleLogout = () => {
                setCurrentUser(null);
                showToast("ออกจากระบบเรียบร้อยแล้ว");
            };

            const getLocalDateString = (date) => {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            };

            const isWeekend = (date) => {
                const day = date.getDay();
                return day === 0 || day === 6; 
            };

            const isSchoolHoliday = (dateStr) => holidays.some(h => h.date === dateStr);
            const getHolidayName = (dateStr) => {
                const hol = holidays.find(h => h.date === dateStr);
                return hol ? hol.name : "";
            };
            const getSchoolActivity = (dateStr) => activities.find(a => a.date === dateStr);

            const getContiguousNonWorkingBlockLength = (targetDate, direction) => {
                let current = new Date(targetDate.getTime());
                let count = 0;
                while (true) {
                    current.setDate(current.getDate() + direction);
                    const currentStr = getLocalDateString(current);
                    if (isWeekend(current) || isSchoolHoliday(currentStr)) {
                        count++;
                    } else {
                        break; 
                    }
                }
                return count;
            };

            const calculateLeaveDays = (startDateStr, endDateStr, period = "all_day") => {
                const actualEndDateStr = period !== "all_day" ? startDateStr : endDateStr;
                if (!startDateStr || !actualEndDateStr) return { total: 0, breakdown: [] };
                
                const start = new Date(startDateStr);
                const end = new Date(actualEndDateStr);
                
                if (end < start) return { total: 0, breakdown: [] };

                const breakdown = [];
                let totalDeducted = 0;

                let current = new Date(start.getTime());
                while (current <= end) {
                    const dateStr = getLocalDateString(current);
                    
                    if (isWeekend(current) || isSchoolHoliday(dateStr)) {
                        const hName = getHolidayName(dateStr);
                        const reasonLabel = isWeekend(current) ? "วันหยุดสุดสัปดาห์" : `วันหยุดราชการ (${hName})`;
                        breakdown.push({ date: dateStr, base: 0, penalty: 0, penaltyReason: reasonLabel, final: 0 });
                    } else {
                        let base = period !== "all_day" ? 0.5 : 1.0;
                        let penalty = 0;
                        let penaltyReason = period !== "all_day" ? "อัตราลาครึ่งวัน" : "อัตราลาปกติ";

                        const schoolActivity = getSchoolActivity(dateStr);
                        let activityDeduction = 0;
                        let hasActivity = false;
                        if (schoolActivity) {
                            hasActivity = true;
                            activityDeduction = 1.5;
                        }

                        const prevBlock = getContiguousNonWorkingBlockLength(current, -1);
                        const nextBlock = getContiguousNonWorkingBlockLength(current, 1);

                        let adjDeduction = 1.0;
                        let adjReason = "";

                        // กฎค่อมวันหยุดทวีคูณ (Sandwich Rule) จะถูกคิดเฉพาะเมื่อเป็นการลาเต็มวันเพื่อความเป็นธรรม
                        if (period === "all_day") {
                            if (prevBlock > 0 && nextBlock > 0) {
                                const totalHolidaysSandwich = prevBlock + nextBlock;
                                adjDeduction = 1.0 + totalHolidaysSandwich;
                                adjReason = `ลาค่อมวันหยุด (ก่อนหน้า ${prevBlock} หลัง ${nextBlock})`;
                            } else {
                                const maxBlock = Math.max(prevBlock, nextBlock);
                                if (maxBlock >= 3) {
                                    adjDeduction = 1.0 + maxBlock;
                                    adjReason = `ติดวันหยุดยาวต่อเนื่อง (${maxBlock} วัน)`;
                                } else if (maxBlock === 2) {
                                    adjDeduction = 2.0;
                                    adjReason = "ติดวันหยุดเสาร์-อาทิตย์";
                                }
                            }
                        }

                        let finalDeductedForDay = 1.0;
                        
                        if (period !== "all_day") {
                            // การลาครึ่งวัน คิดเป็นสัดส่วนครึ่งหนึ่งจากเกณฑ์ของวันนั้น ๆ
                            if (hasActivity) {
                                finalDeductedForDay = activityDeduction * 0.5; // ตัวอย่าง: วันกิจกรรมหัก 1.5 ลาครึ่งวันหัก 0.75 วัน
                                penalty = (activityDeduction - 1.0) * 0.5;
                                penaltyReason = `ตรงกับวันกิจกรรม: ${schoolActivity.name} (ลาครึ่งวัน)`;
                            } else {
                                finalDeductedForDay = 0.5;
                                penaltyReason = "ลาครึ่งวันปกติ";
                            }
                        } else {
                            // ลาเต็มวันปกติ
                            if (hasActivity && adjDeduction > 1.0) {
                                if (adjDeduction >= activityDeduction) {
                                    finalDeductedForDay = adjDeduction;
                                    penalty = adjDeduction - 1.0;
                                    penaltyReason = `${adjReason} และวันกิจกรรม`;
                                } else {
                                    finalDeductedForDay = activityDeduction;
                                    penalty = 0.5;
                                    penaltyReason = `มีกิจกรรมโรงเรียน (${schoolActivity.name}) [คิดเกณฑ์ 1.5 วัน]`;
                                }
                            } else if (adjDeduction > 1.0) {
                                finalDeductedForDay = adjDeduction;
                                penalty = adjDeduction - 1.0;
                                penaltyReason = adjReason;
                            } else if (hasActivity) {
                                finalDeductedForDay = activityDeduction;
                                penalty = 0.5;
                                penaltyReason = `ตรงกับวันกิจกรรม: ${schoolActivity.name}`;
                            }
                        }

                        breakdown.push({ date: dateStr, base: base, penalty: penalty, penaltyReason: penaltyReason, final: finalDeductedForDay });
                        totalDeducted += finalDeductedForDay;
                    }
                    current.setDate(current.getDate() + 1);
                }
                return { total: totalDeducted, breakdown };
            };

            const leaveCalculation = calculateLeaveDays(formData.startDate, formData.endDate, formData.period);

            const handleRequestLeave = (e) => {
                e.preventDefault();
                if (!formData.startDate || !formData.reason) {
                    showToast("กรุณากรอกข้อมูลวันที่และเหตุผลการลาให้ครบถ้วน", "error");
                    return;
                }

                if (formData.period === "all_day" && !formData.endDate) {
                    showToast("กรุณาระบุวันสุดท้ายที่ต้องการลา", "error");
                    return;
                }

                const currentTeacher = users.find(u => u.id === selectedTeacherId);
                const stats = getTeacherStats(selectedTeacherId);
                const calc = calculateLeaveDays(formData.startDate, formData.endDate, formData.period);

                if (calc.total === 0) {
                    showToast("วันที่เลือกเป็นวันหยุดทั้งหมด ไม่จำเป็นต้องยื่นใบลา", "error");
                    return;
                }

                const currentBalance = formData.type === "personal" 
                    ? currentTeacher.personalQuota - stats.personalUsed
                    : currentTeacher.sickQuota - stats.sickUsed;

                if (calc.total > currentBalance) {
                    showToast(`วันลาไม่พอ (ต้องการ ${calc.total} วัน แต่คงเหลือเพียง ${currentBalance} วัน)`, "error");
                    return;
                }

                const newRequest = {
                    id: "L" + String(leaves.length + 1).padStart(2, '0') + "_" + Date.now().toString().slice(-4),
                    teacherId: selectedTeacherId,
                    startDate: formData.startDate,
                    endDate: formData.period !== "all_day" ? formData.startDate : formData.endDate,
                    type: formData.type,
                    period: formData.period,
                    reason: formData.reason,
                    totalDeducted: calc.total,
                    status: "approved",
                    breakdown: calc.breakdown,
                    createdAt: getLocalDateString(new Date())
                };

                setLeaves([newRequest, ...leaves]);
                setFormData({ startDate: "", endDate: "", type: "personal", reason: "", period: "all_day" });
                showToast("บันทึกข้อมูลการลางานและปรับสิทธิ์สะสมเรียบร้อยแล้ว");
            };

            const handleDeleteLeave = (leaveId) => {
                triggerConfirm(
                    "ยืนยันการยกเลิกใบลา",
                    "ต้องการยกเลิกประวัติการลางานใบนี้ใช่หรือไม่? ระบบจะคืนสิทธิ์วันลาให้ทันที",
                    () => {
                        setLeaves(leaves.filter(l => l.id !== leaveId));
                        showToast("ยกเลิกรายการลางานและคืนสิทธิ์เรียบร้อยแล้ว");
                    }
                );
            };

            const handleAdjustLate = (id, amount) => {
                setUsers(users.map(u => {
                    if (u.id === id) {
                        const newCount = Math.max(0, (u.lateCount || 0) + amount);
                        return { ...u, lateCount: newCount };
                    }
                    return u;
                }));
                showToast("อัปเดตสถิติการมาสายเรียบร้อยแล้ว");
            };

            const handleGenerate49Teachers = () => {
                const thaiFirstNames = [
                    "กิตติ", "เฉลิม", "ณัฐพงษ์", "ทรงพล", "ธนพล", "นพดล", "ประเสริฐ", "พงษ์ศักดิ์", "ยุทธนา", "วรวุฒิ",
                    "สุรชัย", "เกรียงไกร", "จารุวรรณ", "ชลลดา", "ดวงพร", "ทิพวรรณ", "นงลักษณ์", "เบญจวรรณ", "ปัทมา", "พรทิพย์"
                ];
                const thaiLastNames = [
                    "สุวรรณรัตน์", "สมบูรณ์ดี", "รักษาใจ", "ดีเสมอ", "เจริญรุ่งเรือง", "เลิศวิจิตร", "ตั้งมโนมั่น", "เกียรติขจร", "ประชานิยม"
                ];
                const prefixes = ["นาย", "นาง", "นางสาว"];

                const currentCount = users.filter(u => u.role === "teacher").length;
                if (currentCount >= 47) {
                    showToast("ในระบบมีจำนวนบุคลากรครบถ้วนแล้ว (49 คน)", "info");
                    return;
                }

                const additionalUsers = [];
                const neededTeachersCount = 47 - currentCount;
                
                for (let i = 1; i <= neededTeachersCount; i++) {
                    const prefix = prefixes[Math.floor(Math.random() * prefixes.length)];
                    const firstName = thaiFirstNames[Math.floor(Math.random() * thaiFirstNames.length)];
                    const lastName = thaiLastNames[Math.floor(Math.random() * thaiLastNames.length)];
                    const sickQuota = Math.floor(Math.random() * 11) + 20; 
                    const personalQuota = Math.floor(Math.random() * 8) + 10; 
                    const newId = `T${String(10 + i).padStart(2, '0')}`;
                    const email = `teacher.${newId.toLowerCase()}@yuvaphat.ac.th`;

                    additionalUsers.push({
                        id: newId, prefix, name: `${firstName} ${lastName}`, role: "teacher", password: "1234", email, sickQuota, personalQuota, lateCount: 0, photo: ""
                    });
                }

                setUsers([...users, ...additionalUsers]);
                showToast(`สร้างรายชื่อบุคลากรจำลองเพิ่มเติมสำเร็จ ปัจจุบันมีบุคลากรครบ 49 คนพอดี`);
            };

            const handleAddTeacher = (e) => {
                e.preventDefault();
                if (!newTeacher.name) {
                    showToast("กรุณากรอกชื่อ-นามสกุลครู", "error");
                    return;
                }
                const prefixId = newTeacher.role === "admin" ? "A" : newTeacher.role === "hr" ? "HR" : "T";
                const numSuffix = String(users.filter(u => u.id.startsWith(prefixId)).length + 1).padStart(2, '0');
                const newId = prefixId + numSuffix;
                const finalEmail = newTeacher.email.trim() || `${newId.toLowerCase()}@yuvaphat.ac.th`;

                const u = {
                    id: newId, prefix: newTeacher.prefix, name: newTeacher.name, role: newTeacher.role, password: newTeacher.password || "1234", email: finalEmail, sickQuota: Number(newTeacher.sickQuota), personalQuota: Number(newTeacher.personalQuota), lateCount: 0, photo: newTeacher.photo || ""
                };
                setUsers([...users, u]);
                setNewTeacher({ prefix: "นาย", name: "", email: "", sickQuota: 30, personalQuota: 15, role: "teacher", password: "1234", photo: "" });
                setShowAddTeacherModal(false);
                showToast(`เพิ่มบุคลากร ${u.id} - ${u.prefix}${u.name} สำเร็จ`);
            };

            const handleOpenEditTeacher = (teacher) => {
                setEditingTeacher({ ...teacher });
                setShowEditTeacherModal(true);
            };

            const handleUpdateTeacher = (e) => {
                e.preventDefault();
                if (!editingTeacher.name) {
                    showToast("กรุณากรอกชื่อ-นามสกุลครู", "error");
                    return;
                }
                setUsers(users.map(u => {
                    if (u.id === editingTeacher.id) {
                        return {
                            ...u,
                            prefix: editingTeacher.prefix,
                            name: editingTeacher.name,
                            sickQuota: Number(editingTeacher.sickQuota),
                            personalQuota: Number(editingTeacher.personalQuota),
                            photo: editingTeacher.photo || ""
                        };
                    }
                    return u;
                }));
                setShowEditTeacherModal(false);
                setEditingTeacher(null);
                showToast("แก้ไขข้อมูลสิทธิ์การลาสะเรียบร้อยแล้ว");
            };

            const handleDeleteTeacher = (id) => {
                triggerConfirm(
                    "ลบรายชื่อบุคลากร",
                    `ต้องการลบบุคลากร ${id} หรือไม่?`,
                    () => {
                        setUsers(users.filter(u => u.id !== id));
                        showToast("ลบข้อมูลบุคลากรเรียบร้อยแล้ว", "error");
                    }
                );
            };

            const handleRoleChange = (userId, newRole) => {
                if (userId === currentUser.id) {
                    showToast("ไม่สามารถปรับเปลี่ยนสิทธิ์ตัวเองได้", "error");
                    return;
                }
                setUsers(users.map(u => {
                    if (u.id === userId) return { ...u, role: newRole };
                    return u;
                }));
                showToast(`อัปเดตสิทธิ์ระบบเรียบร้อย`);
            };

            const handleUserPasswordChange = (userId, newPass) => {
                if (!newPass.trim()) return;
                setUsers(users.map(u => {
                    if (u.id === userId) return { ...u, password: newPass };
                    return u;
                }));
                showToast(`อัปเดตสหัสผ่านสำเร็จ`);
            };

            const handleUserEmailChange = (userId, newEmail) => {
                if (!newEmail.trim()) return;
                setUsers(users.map(u => {
                    if (u.id === userId) return { ...u, email: newEmail.trim() };
                    return u;
                }));
                showToast("อัปเดตอีเมลเรียบร้อย");
            };

            const handleAddHoliday = (e) => {
                e.preventDefault();
                if (!newHoliday.date || !newHoliday.name) {
                    showToast("กรุณากรอกข้อมูลวันหยุดให้ครบถ้วน", "error");
                    return;
                }
                setHolidays([...holidays, newHoliday].sort((a,b) => a.date.localeCompare(b.date)));
                setNewHoliday({ date: "", name: "" });
                setShowAddHolidayModal(false);
                showToast("เพิ่มวันหยุดเรียบร้อย");
            };

            const handleDeleteHoliday = (date) => {
                triggerConfirm("ลบวันหยุด", "ต้องการนำวันหยุดออกใช่หรือไม่?", () => {
                    setHolidays(holidays.filter(h => h.date !== date));
                    showToast("ลบวันหยุดเรียบร้อยแล้ว", "error");
                });
            };

            const handleAddActivity = (e) => {
                e.preventDefault();
                if (!newActivity.date || !newActivity.name) {
                    showToast("กรุณากรอกข้อมูลให้ครบถ้วน", "error");
                    return;
                }
                setActivities([...activities, newActivity].sort((a,b) => a.date.localeCompare(b.date)));
                setNewActivity({ date: "", name: "", session: "morning" });
                setShowAddActivityModal(false);
                showToast("บันทึกวันกิจกรรมเรียบร้อย");
            };

            const handleDeleteActivity = (date) => {
                triggerConfirm("ยกเลิกกิจกรรม", "ต้องการลบกิจกรรมใช่หรือไม่?", () => {
                    setActivities(activities.filter(a => a.date !== date));
                    showToast("ลบวันกิจกรรมเรียบร้อยแล้ว", "error");
                });
            };

            const formatThaiDate = (dateStr) => {
                if (!dateStr) return "-";
                const months = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
                const d = new Date(dateStr);
                return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear() + 543}`;
            };

            const getSessionThai = (session) => {
                if (session === "morning") return "ช่วงเช้า";
                if (session === "afternoon") return "ช่วงบ่าย";
                return "ทั้งวัน";
            };

            const renderAvatar = (teacherObj, sizeClass = "w-11 h-11 text-sm") => {
                if (teacherObj && teacherObj.photo) {
                    return (
                        <div className="relative flex-shrink-0">
                            <img 
                                src={teacherObj.photo} 
                                alt={teacherObj.name} 
                                className={`${sizeClass.split(' ')[0]} ${sizeClass.split(' ')[1]} rounded-full object-cover border-2 border-emerald-700 shadow-md`}
                                onError={(e) => {
                                    e.target.style.display = 'none';
                                    e.target.nextSibling.style.display = 'flex';
                                }}
                            />
                        </div>
                    );
                }
                const initialChar = teacherObj ? teacherObj.name.trim().charAt(0) : "?";
                return (
                    <div className={`${sizeClass} rounded-full bg-gradient-to-tr from-navy-800 to-emerald-700 text-white font-extrabold flex items-center justify-center border-2 border-white shadow-md uppercase text-center flex-shrink-0`}>
                        {initialChar}
                    </div>
                );
            };

            const selectedTeacher = users.find(u => u.id === selectedTeacherId);
            const selectedTeacherStats = selectedTeacher ? getTeacherStats(selectedTeacherId) : null;

            if (!currentUser) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#F1F5F9] p-4 relative overflow-hidden">
                        <div className="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-emerald-100/30 blur-3xl"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-navy-800/8 blur-3xl"></div>

                        {/* หน้าล็อกอินขนาดกะทัดรัด (เดิม) สัดส่วนสมมาตรหรูหราเป๊ะ ๆ */}
                        <div className="w-full max-w-md bg-white rounded-[28px] shadow-[0_20px_50px_-15px_rgba(15,30,54,0.12)] overflow-hidden border border-slate-100/80 relative z-10">
                            
                            <header className="luxury-gradient text-white p-8 text-center relative border-b-4 border-emerald-700">
                                <div className="absolute top-0 left-0 right-0 bottom-0 bg-[radial-gradient(circle_at_center,rgba(255,255,255,0.05),transparent)] pointer-events-none"></div>
                                
                                <div className="w-24 h-24 flex items-center justify-center mx-auto mb-3 relative overflow-hidden">
                                    <img 
                                        src="logo.png" 
                                        alt="Yuwapat Logo" 
                                        className="w-full h-full object-contain"
                                        onError={(e) => {
                                            if (e.target.src.indexOf('logo.png') !== -1) {
                                                e.target.src = "https://lh3.googleusercontent.com/d/1c3cjNBo_XSXdYjn6RAWkodMqChNPrk49";
                                            } else {
                                                e.target.style.display = 'none';
                                                const fallback = e.target.nextSibling;
                                                if (fallback) fallback.classList.remove('hidden');
                                            }
                                        }}
                                    />
                                    <i className="fa-solid fa-graduation-cap text-3xl text-emerald-100 hidden"></i>
                                </div>

                                <h2 className="text-xl font-extrabold tracking-wide text-white">Yuwapat Early Childhood School</h2>
                                <p className="text-xs text-emerald-100 mt-1.5 font-normal">โรงเรียนอนุบาลยุวพัฒน์นครสวรรค์</p>
                                <div className="w-10 h-0.5 bg-emerald-200/50 mx-auto mt-3 rounded-full"></div>
                                <p className="text-[9px] text-slate-300 mt-1.5 uppercase tracking-widest font-light">Leave Management Portal</p>
                            </header>

                            {notification && (
                                <div className="mx-6 mt-4 p-3.5 text-xs rounded-xl border flex items-center gap-3 bg-red-50 text-red-800 border-red-100 text-left">
                                    <i className="fa-solid fa-triangle-exclamation text-red-500 text-base"></i>
                                    <span className="font-semibold">{notification.message}</span>
                                </div>
                            )}

                            <form onSubmit={handleLogin} className="p-8 space-y-5">
                                <div className="space-y-1.5 text-left">
                                    <label className="block text-slate-700 text-xs font-bold uppercase tracking-wider">อีเมลโรงเรียน / รหัสประจำตัว</label>
                                    <div className="relative w-full">
                                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                            <i className="fa-solid fa-envelope text-slate-400 text-sm"></i>
                                        </div>
                                        <input 
                                            type="text" 
                                            placeholder="ตัวอย่าง: admin@yuvaphat.ac.th"
                                            value={loginId}
                                            onChange={(e) => setLoginId(e.target.value)}
                                            className="block w-full bg-slate-50/80 border border-slate-200 text-slate-800 pl-11 pr-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-700 focus:bg-white text-sm font-semibold text-left transition-all duration-300 emerald-glow placeholder-slate-400"
                                            required
                                        />
                                    </div>
                                </div>

                                <div className="space-y-1.5 text-left">
                                    <label className="block text-slate-700 text-xs font-bold uppercase tracking-wider">รหัสผ่านเข้าใช้งาน</label>
                                    <div className="relative w-full">
                                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                            <i className="fa-solid fa-key text-slate-400 text-sm"></i>
                                        </div>
                                        <input 
                                            type="password" 
                                            placeholder="กรอกรหัสผ่าน (เริ่มต้น 1234)"
                                            value={loginPassword}
                                            onChange={(e) => setLoginPassword(e.target.value)}
                                            className="block w-full bg-slate-50/80 border border-slate-200 text-slate-800 pl-11 pr-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-700 focus:bg-white text-sm font-semibold text-left transition-all duration-300 emerald-glow placeholder-slate-400"
                                            required
                                        />
                                    </div>
                                </div>

                                <button 
                                    type="submit"
                                    className="w-full bg-emerald-700 hover:bg-emerald-800 active:scale-95 text-white font-bold py-3.5 px-6 rounded-xl transition duration-300 shadow-md flex items-center justify-center gap-2 text-xs uppercase tracking-wider border border-emerald-600"
                                >
                                    <i className="fa-solid fa-shield-halved"></i>
                                    เข้าสู่ระบบความปลอดภัย
                                </button>
                            </form>

                            {SHOW_DEMO_PORTAL && (
                                <div className="bg-[#FAF9F5] p-8 border-t border-slate-100 text-xs text-slate-600 text-left">
                                    <p className="font-bold text-slate-800 mb-3 flex items-center gap-2">
                                        <i className="fa-solid fa-circle-info text-emerald-700 animate-pulse"></i>
                                        บัญชีสาธิตสำหรับทดสอบระบบ (Demo Accounts):
                                    </p>
                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-2.5">
                                        <button onClick={() => { setLoginId("admin@yuvaphat.ac.th"); setLoginPassword("1234"); }} className="bg-white hover:bg-emerald-50 border p-2.5 rounded-xl text-left shadow-sm">
                                            <span className="font-extrabold text-navy-900 block text-[10px]">⭐ ADMIN</span>
                                            <span className="text-[9px] text-slate-500 block truncate">admin@yuvaphat.ac.th</span>
                                        </button>
                                        <button onClick={() => { setLoginId("hr@yuvaphat.ac.th"); setLoginPassword("1234"); }} className="bg-white hover:bg-emerald-50 border p-2.5 rounded-xl text-left shadow-sm">
                                            <span className="font-extrabold text-navy-900 block text-[10px]">⭐ HR</span>
                                            <span className="text-[9px] text-slate-500 block truncate">hr@yuvaphat.ac.th</span>
                                        </button>
                                        <button onClick={() => { setLoginId("somchai.r@yuvaphat.ac.th"); setLoginPassword("1234"); }} className="bg-white hover:bg-emerald-50 border p-2.5 rounded-xl text-left shadow-sm">
                                            <span className="font-extrabold text-navy-900 block text-[10px]">⭐ TEACHER</span>
                                            <span className="text-[9px] text-slate-500 block truncate">somchai.r...</span>
                                        </button>
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col bg-[#F8FAFC]">
                    
                    <header className="luxury-gradient text-white shadow-xl sticky top-0 z-30 border-b border-emerald-700/50">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3.5 flex flex-col lg:flex-row items-center justify-between gap-4">
                            
                            <div className="flex items-center gap-3.5">
                                <div className="w-14 h-14 flex items-center justify-center relative overflow-hidden flex-shrink-0">
                                    <img 
                                        src="logo.png" 
                                        alt="Yuwapat Logo" 
                                        className="w-full h-full object-contain"
                                        onError={(e) => {
                                            if (e.target.src.indexOf('logo.png') !== -1) {
                                                e.target.src = "https://lh3.googleusercontent.com/d/1c3cjNBo_XSXdYjn6RAWkodMqChNPrk49";
                                            } else {
                                                e.target.style.display = 'none';
                                                const fallback = e.target.nextSibling;
                                                if (fallback) fallback.classList.remove('hidden');
                                            }
                                        }}
                                    />
                                    <i className="fa-solid fa-graduation-cap text-xl text-emerald-700 hidden"></i>
                                </div>
                                <div className="text-center lg:text-left">
                                    <h1 className="text-lg sm:text-xl font-black tracking-wide text-white">
                                        Yuwapat Early Childhood School
                                    </h1>
                                    <p className="text-xs sm:text-sm text-emerald-200 font-medium">โรงเรียนอนุบาลยุวพัฒน์นครสวรรค์</p>
                                </div>
                            </div>

                            <div className="flex items-center gap-4 flex-wrap w-full lg:w-auto justify-center lg:justify-end">
                                {currentUser.role !== "teacher" && (
                                    <div className="flex bg-navy-950 p-1 rounded-xl border border-emerald-700/30">
                                        <button 
                                            onClick={() => setActiveTab("teacher")}
                                            className={`flex items-center gap-2 px-5 py-2.5 rounded-lg text-xs sm:text-sm font-bold transition-all ${activeTab === 'teacher' ? 'bg-emerald-700 text-white shadow' : 'text-slate-300 hover:text-white'}`}
                                        >
                                            พอร์ทัลคุณครู
                                        </button>
                                        <button 
                                            onClick={() => setActiveTab("admin")}
                                            className={`flex items-center gap-2 px-5 py-2.5 rounded-lg text-xs sm:text-sm font-bold transition-all ${activeTab === 'admin' ? 'bg-emerald-700 text-white shadow' : 'text-slate-300 hover:text-white'}`}
                                        >
                                            ฝ่ายบริหารงานบุคคล
                                        </button>
                                    </div>
                                )}

                                <div className="flex items-center gap-3 bg-navy-950 pl-4 pr-2 py-2 rounded-xl border border-emerald-700/30">
                                    <div className="text-right">
                                        <p className="text-[10px] font-bold text-emerald-600 uppercase tracking-widest">{currentUser.role === 'admin' ? 'แอดมินสูงสุด' : currentUser.role === 'hr' ? 'ฝ่ายบุคคล (HR)' : 'คุณครู'}</p>
                                        <p className="text-sm font-bold text-white">{currentUser.prefix}{currentUser.name}</p>
                                    </div>
                                    <button 
                                        onClick={handleLogout}
                                        className="bg-red-600 hover:bg-red-700 text-white w-9 h-9 rounded-lg flex items-center justify-center transition shadow"
                                        title="ออกจากระบบ"
                                    >
                                        <i className="fa-solid fa-power-off text-sm"></i>
                                    </button>
                                </div>
                            </div>

                        </div>
                    </header>

                    {notification && (
                        <div className="fixed top-24 right-4 z-50 animate-bounce">
                            <div className={`shadow-2xl rounded-2xl p-4 flex items-center gap-3 border ${notification.type === 'error' ? 'bg-red-50 border-red-200 text-red-800' : 'bg-emerald-50 border-emerald-200 text-emerald-800'}`}>
                                <i className={`fa-solid ${notification.type === 'error' ? 'fa-circle-xmark text-red-500' : 'fa-circle-check text-emerald-600'} text-2xl`}></i>
                                <div>
                                    <p className="font-extrabold text-base">ระบบแจ้งเตือนวันลา</p>
                                    <p className="text-sm mt-0.5 font-semibold">{notification.message}</p>
                                </div>
                            </div>
                        </div>

                                                            onClick={() => setFormData({ ...formData, period: "afternoon" })}
